name: Bug Report
description: Report a problem with the InHive app or core
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do **not** include
        secrets, real subscription URLs, or real server addresses.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Android, Windows, iOS, macOS, Linux, Core/library]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App / Core version
      placeholder: "e.g. 4.5.1"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (sanitized)
      description: Remove any secrets, real domains, or IPs before pasting.
      render: shell
